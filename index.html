<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden Guild Portal | Utility & Maps</title>
    
    <link rel="stylesheet" href="itm/items.css">
<script src="itm/item.js"></script>
<script src="itm/maps.js"></script>
    
    <style>
        body
        <div style="background: #222; border: 2px solid #ffcc00; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);">
    <h2 style="margin-top: 0; color: #ffcc00; font-size: 1.2em; display: flex; align-items: center;">
        🛡️ BACHECA GILDA: <span style="color: #00ff00; margin-left: 10px; font-size: 0.8em;">● ONLINE</span>
    </h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div style="border-right: 1px solid #444; padding-right: 10px;">
            <strong style="color: #4db8ff;">⚔️ PROSSIMO RAID:</strong><br>
            <span style="font-size: 0.9em;">Raid Drago - Venerdì ore 21:15 (Ritrovo a Camelot)</span>
        </div>
        <div>
            <strong style="color: #ff4d4d;">📢 RECLUTAMENTO:</strong><br>
            <span style="font-size: 0.9em;">Cerchiamo 1 Bardo e 1 Druido per Gruppo Fisso</span>
        </div>
    </div>
</div>
        { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; }
        
        h1 { color: #ffcc00; text-shadow: 2px 2px #000; border-bottom: 2px solid #333; }

        .search-box { 
            margin-bottom: 20px; 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 8px; 
            display: flex; 
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        input, select { 
            padding: 12px; 
            background: #2a2a2a; 
            border: 1px solid #444; 
            color: white; 
            border-radius: 4px; 
            flex-grow: 1; 
        }

        table { width: 100%; border-collapse: collapse; background: #1e1e1e; margin-top: 10px; }
        th { background: #333; color: #ffcc00; padding: 15px; text-align: left; text-transform: uppercase; font-size: 13px; border-bottom: 2px solid #444; }
        td { padding: 12px; border-bottom: 1px solid #333; font-size: 14px; }
        tr:hover { background: #252525; }

        .utility-high { color: #00ff00; font-weight: bold; text-shadow: 0 0 5px #00ff00; }
        
        .btn-map { 
            background: #cc9900; 
            color: black; 
            border: none; 
            padding: 6px 12px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 11px;
        }
        .btn-map:hover { background: #ffcc00; }
        .no-map { color: #555; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>EDEN GUILD PORTAL</h1>
    
    <div class="search-box">
        <input type="text" id="txtSearch" placeholder="Cerca oggetto o boss...">
        <select id="selRealm">
            <option value="">Tutti i Reami</option>
            <option value="1">Albion</option>
            <option value="2">Midgard</option>
            <option value="3">Hibernia</option>
        </select>
    </div>

    <table id="itemTable">
        <thead>
            <tr>
                <th>Nome Oggetto</th>
                <th>Slot</th>
                <th>Utility</th>
                <th>Localizzazione Boss</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="4">In attesa dei dati daoc.json...</td></tr>
        </tbody>
    </table>
</div>

<script src="item.js"></script>
<script src="maps.js"></script>

<script>
    let allItems = [];

   // Aggiungiamo 'itm/' davanti al nome del file
fetch('itm/daoc.json') 
    .then(res => res.json())
    .then(data => {
        // Il resto rimane uguale
        allItems = data.objects || data.items || data;
        console.log("Database caricato correttamente dalla cartella itm!");
        updateDisplay();
    })
    .catch(err => {
        console.error("Errore:", err);
        document.getElementById('tableBody').innerHTML = "Errore: Non trovo il file in itm/daoc.json";
    });

    function updateDisplay() {
        const query = document.getElementById('txtSearch').value.toLowerCase();
        const realm = document.getElementById('selRealm').value;

        const filtered = allItems.filter(i => {
            const matchName = i.name?.toLowerCase().includes(query);
            const matchRealm = realm === "" || i.realm == realm;
            return matchName && matchRealm;
        });

        renderTable(filtered);
    }

    function renderTable(list) {
        const body = document.getElementById('tableBody');
        const limit = list.slice(0, 100); // Ottimizzazione performance
        
        body.innerHTML = limit.map(item => {
            // Logica Mappa: controlliamo se l'item ha un riferimento a un boss o zona
            const locationId = item.mob_id || item.zone_id || null;
            const utilityValue = parseFloat(item.utility) || 0;
            
            const mapCell = locationId 
                ? `<button class="btn-map" onclick="findLocation(${locationId}, '${item.name.replace(/'/g, "\\'")}')">📍 MAPPA</button>` 
                : `<span class="no-map">N/A</span>`;

            return `
                <tr>
                    <td style="color: #4db8ff; font-weight:bold;">${item.name}</td>
                    <td>${item.slot || '-'}</td>
                    <td class="${utilityValue > 50 ? 'utility-high' : ''}">${utilityValue}</td>
                    <td>${mapCell}</td>
                </tr>
            `;
        }).join('');
    }

    // Funzione per incrociare i dati con maps.js
    function findLocation(id, itemName) {
        // Cerchiamo nelle variabili caricate da maps.js (solitamente si chiamano 'maps' o 'zones')
        // Adattiamo la ricerca in base a come è strutturato il tuo maps.js
        if (typeof maps !== 'undefined') {
            const loc = maps.find(m => m.id === id || m.mob_id === id);
            if (loc) {
                alert(`INFO DROPPATO DA: ${loc.mob_name || 'Boss'}\nZONA: ${loc.zone_name}\nCOORDINATE: X: ${loc.x}, Y: ${loc.y}`);
            } else {
                alert(`Dati mappa non trovati per l'ID ${id}. Controlla il file maps.js.`);
            }
        } else {
            alert("Il file maps.js è stato caricato ma la variabile 'maps' non è definita.");
        }
    }

    // Eventi filtri
    document.getElementById('txtSearch').addEventListener('input', updateDisplay);
    document.getElementById('selRealm').addEventListener('change', updateDisplay);
</script>

</body>
</html>
