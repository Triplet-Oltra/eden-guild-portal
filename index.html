<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden DAoC - Database Gilda</title>
    <link rel="stylesheet" href="itm/items.css">
    <script src="itm/item.js"></script>
    <script src="itm/maps.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .search-box { background: #2a2a2a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; }
        input, select { padding: 10px; border-radius: 4px; border: 1px solid #555; background: #333; color: white; margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #333; text-align: left; padding: 12px; border-bottom: 2px solid #444; }
        td { padding: 12px; border-bottom: 1px solid #333; }
        .btn-map { background: #ffcc00; color: black; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-map:hover { background: #e6b800; }
        .loading { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🛡️ Database Oggetti Eden</h2>

    <div class="search-box">
        <input type="text" id="txtSearch" placeholder="Cerca oggetto o boss..." style="width: 300px;">
        <select id="selRealm">
            <option value="">Tutti i Reami</option>
            <option value="1">Albion</option>
            <option value="2">Midgard</option>
            <option value="3">Hibernia</option>
        </select>
        <button onclick="updateDisplay()" style="padding: 10px 20px; cursor:pointer;">CERCA</button>
        <p id="statusMsg" class="loading">Tentativo di caricamento daoc.json...</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nome Oggetto</th>
                <th>Slot</th>
                <th>Utility</th>
                <th>Mappa</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

  <script>
    let allItems = [];
    let metadata = {};
    let timeout = null;

    // Caricamento dei file
    Promise.all([
        fetch('daoc_item_metadata.json').then(res => res.json()),
        fetch('static_objects.json').then(res => res.json())
    ])
    .then(([metaData, itemData]) => {
        metadata = metaData;
        allItems = Array.isArray(itemData) ? itemData : (itemData.items || Object.values(itemData).filter(i => typeof i === 'object'));
        
        document.getElementById('statusMsg').innerHTML = `✅ Database Online: <strong>${allItems.length}</strong> oggetti.`;
    })
    .catch(err => {
        document.getElementById('statusMsg').innerHTML = "❌ Errore caricamento file.";
    });

    // Funzione per tradurre lo Slot ID in testo (es. 12 -> Belt)
    function getSlotName(slotId) {
        if (!metadata.slots) return `Slot ${slotId}`;
        return metadata.slots[slotId] || `Slot ${slotId}`;
    }

    function renderTable(list) {
        const body = document.getElementById('tableBody');
        body.innerHTML = list.map(item => {
            const descrizione = item.delve_text ? item.delve_text.replace(/\n/g, '<br>') : 'Nessun dettaglio';
            
            // Cerchiamo il nome della zona o del mob
            let location = "Mappa Sconosciuta";
            if (item.sources?.monsters?.one_time_drop) {
                location = `Drop: ${item.sources.monsters.one_time_drop.join(', ')}`;
            } else if (item.sources?.area) {
                location = item.sources.area;
            }

            return `
                <tr style="border-bottom: 1px solid #333;">
                    <td style="color:#4db8ff; font-weight:bold; padding:10px;">
                        ${item.name}<br>
                        <span style="color:#888; font-size:0.8em;">${getSlotName(item.slot)}</span>
                    </td>
                    <td style="font-size: 0.85em; color: #ccc; padding:10px;">
                        ${descrizione}
                    </td>
                    <td style="color: #00ff00; font-size: 0.9em; padding:10px;">
                        ${location}
                    </td>
                </tr>
            `;
        }).join('');
    }

    function updateDisplay() {
        clearTimeout(timeout);
        const query = document.getElementById('txtSearch').value.toLowerCase().trim();
        if (query.length < 3) return;

        timeout = setTimeout(() => {
            const filtered = allItems.filter(i => 
                (i.name || "").toLowerCase().includes(query) || 
                (i.delve_text || "").toLowerCase().includes(query)
            );
            renderTable(filtered.slice(0, 50));
        }, 300);
    }

    document.getElementById('txtSearch').addEventListener('input', updateDisplay);
</script>
</body> </html>
