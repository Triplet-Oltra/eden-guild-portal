                document.getElementById('statusMsg').innerHTML = `✅ Caricati ${allItems.length} oggetti.`;

            .catch(err => {
                console.error(err);
                document.getElementById('statusMsg').innerHTML = "❌ Errore: " + err.message;
                document.getElementById('statusMsg').style.color = "red";
            });

                return;

                        </td>
                    </tr>
                `;
            }).join('');
