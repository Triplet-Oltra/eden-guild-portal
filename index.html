<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden DAoC - Database Gilda</title>
    <link rel="stylesheet" href="itm/items.css">
    <script src="itm/item.js"></script>
    <script src="itm/maps.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .search-box { background: #2a2a2a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; }
        input, select { padding: 10px; border-radius: 4px; border: 1px solid #555; background: #333; color: white; margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #333; text-align: left; padding: 12px; border-bottom: 2px solid #444; }
        td { padding: 12px; border-bottom: 1px solid #333; }
        .btn-map { background: #ffcc00; color: black; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-map:hover { background: #e6b800; }
        .loading { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🛡️ Database Oggetti Eden</h2>

    <div class="search-box">
        <input type="text" id="txtSearch" placeholder="Cerca oggetto o boss..." style="width: 300px;">
        <select id="selRealm">
            <option value="">Tutti i Reami</option>
            <option value="1">Albion</option>
            <option value="2">Midgard</option>
            <option value="3">Hibernia</option>
        </select>
        <button onclick="updateDisplay()" style="padding: 10px 20px; cursor:pointer;">CERCA</button>
        <p id="statusMsg" class="loading">Tentativo di caricamento daoc.json...</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nome Oggetto</th>
                <th>Slot</th>
                <th>Utility</th>
                <th>Mappa</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

   <script>
    let allItems = [];
    let metadata = {};
    let timeout = null;

    // Caricamento dei file
    Promise.all([
        fetch('daoc_item_metadata.json').then(res => res.json()),
        fetch('static_objects.json').then(res => res.json())
    ])
    .then(([metaData, itemData]) => {
        metadata = metaData;
        // Estrazione dati flessibile
        allItems = Array.isArray(itemData) ? itemData : (itemData.items || Object.values(itemData).filter(i => typeof i === 'object'));
        
        const status = document.getElementById('statusMsg');
        status.innerHTML = `✅ Database Pronto: <strong>${allItems.length}</strong> oggetti caricati.`;
        status.style.color = "#00ff00";
    })
    .catch(err => {
        document.getElementById('statusMsg').innerHTML = "❌ Errore caricamento file JSON.";
    });

    function renderTable(list) {
        const body = document.getElementById('tableBody');
        if (list.length === 0) {
            body.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px;">Nessun oggetto trovato.</td></tr>';
            return;
        }

        body.innerHTML = list.map(item => {
            // Pulizia del testo delve (rimuove i ritorni a capo brutti)
            const descrizione = item.delve_text ? item.delve_text.replace(/\n/g, '<br>') : 'Nessun dettaglio disponibile';
            const drop = item.sources?.monsters?.one_time_drop ? `<br><small style="color:#00ff00">Drop: ${item.sources.monsters.one_time_drop.join(', ')}</small>` : '';

            return `
                <tr style="border-bottom: 1px solid #333; background: rgba(255,255,255,0.02);">
                    <td style="color:#4db8ff; font-weight:bold; padding:12px; width:30%;">
                        ${item.name}
                        ${drop}
                    </td>
                    <td style="font-size: 0.9em; color: #bbb; padding:12px; line-height:1.4;">
                        ${descrizione}
                    </td>
                    <td style="color: #ffa500; font-weight:bold; text-align:center; width:10%;">
                        Lvl ${item.level || item.bonus_level || '-'}
                    </td>
                </tr>
            `;
        }).join('');
    }

    function updateDisplay() {
        clearTimeout(timeout);
        const query = document.getElementById('txtSearch').value.toLowerCase().trim();
        
        if (query.length < 3) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="3" style="text-align:center; padding:20px;">Scrivi almeno 3 lettere per cercare...</td></tr>';
            return;
        }

        // Aspetta che l'utente finisca di scrivere per non bloccare il browser
        timeout = setTimeout(() => {
            const filtered = allItems.filter(i => 
                (i.name || "").toLowerCase().includes(query) || 
                (i.delve_text || "").toLowerCase().includes(query)
            );
            renderTable(filtered.slice(0, 50)); // Mostra i primi 50 risultati
        }, 300);
    }

    document.getElementById('txtSearch').addEventListener('input', updateDisplay);
</script>
</body> </html>
