<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden DAoC - Database Gilda</title>
    <link rel="stylesheet" href="itm/items.css">
    <script src="itm/item.js"></script>
    <script src="itm/maps.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .search-box { background: #2a2a2a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; }
        input, select { padding: 10px; border-radius: 4px; border: 1px solid #555; background: #333; color: white; margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #333; text-align: left; padding: 12px; border-bottom: 2px solid #444; }
        td { padding: 12px; border-bottom: 1px solid #333; }
        .btn-map { background: #ffcc00; color: black; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-map:hover { background: #e6b800; }
        .loading { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🛡️ Database Oggetti Eden</h2>

    <div class="search-box">
        <input type="text" id="txtSearch" placeholder="Cerca oggetto o boss..." style="width: 300px;">
        <select id="selRealm">
            <option value="">Tutti i Reami</option>
            <option value="1">Albion</option>
            <option value="2">Midgard</option>
            <option value="3">Hibernia</option>
        </select>
        <button onclick="updateDisplay()" style="padding: 10px 20px; cursor:pointer;">CERCA</button>
        <p id="statusMsg" class="loading">Tentativo di caricamento daoc.json...</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nome Oggetto</th>
                <th>Slot</th>
                <th>Utility</th>
                <th>Mappa</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <script>
    // Usiamo un nome unico per evitare conflitti con il browser
    let gildaItems = []; 

    console.log("Tentativo di caricamento database...");

    fetch('itm/daoc.json')
        .then(response => {
            if (!response.ok) throw new Error("File non trovato (404)");
            return response.json();
        })
        .then(jsonDati => {
            console.log("Dati scaricati con successo!");

            // Trasformiamo il tuo JSON delle classi in una lista leggibile
            if (jsonDati.classes) {
                gildaItems = Object.keys(jsonDati.classes).map(nomeClasse => {
                    return {
                        nome: nomeClasse,
                        tipo: "Classe",
                        info: "Realm ID: " + jsonDati.classes[nomeClasse].realm
                    };
                });
            } else {
                gildaItems = Array.isArray(jsonDati) ? jsonDati : [];
            }

            document.getElementById('statusMsg').innerHTML = "✅ Connesso! " + gildaItems.length + " voci pronte.";
            renderGildaTable(gildaItems.slice(0, 20));
        })
        .catch(errore => {
            console.error("Dettaglio errore:", errore);
            document.getElementById('statusMsg').innerHTML = "❌ Errore: " + errore.message;
        });

    function renderGildaTable(lista) {
        const corpoTabella = document.getElementById('tableBody');
        if (!corpoTabella) return;

        corpoTabella.innerHTML = lista.map(item => `
            <tr>
                <td style="color:#4db8ff; font-weight:bold;">${item.nome || item.name || '???'}</td>
                <td>${item.tipo || item.slot || '-'}</td>
                <td>${item.info || item.utility || '-'}</td>
            </tr>
        `).join('');
    }

    // Funzione di ricerca collegata all'input
    document.getElementById('txtSearch').addEventListener('input', (e) => {
        const testo = e.target.value.toLowerCase();
        const filtrati = gildaItems.filter(i => 
            (i.nome || "").toLowerCase().includes(testo)
        );
        renderGildaTable(filtrati.slice(0, 50));
    });
</script>
</body> </html>
